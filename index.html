<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    video { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 1rem; background: black; }
  </style>
  <!-- Histats.com START -->
  <div style="display:none;">
    <a href="/" target="_blank"><img src="//sstatic1.histats.com/0.gif?5011553&101" alt="" border="0"></a>
  </div>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Generator & Result (tidak disentuh) -->
  <div id="generator" class="w-full max-w-md"> ... (sama seperti sebelumnya) ... </div>
  <div id="result" class="hidden w-full max-w-md mt-6"> ... (sama seperti sebelumnya) ... </div>

  <!-- ==================== PLAYER MUNI ==================== -->
  <div id="player" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
    <video id="playerVideo" controls playsinline class="flex-1 w-full h-full object-contain"></video>

    <!-- AGE GATE 18+ -->
    <div id="ageGate" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[100]">
      <div class="bg-gray-900 p-8 rounded-3xl max-w-xs text-center border border-gray-700">
        <h2 class="text-3xl font-bold mb-3">⚠️ KONfirmASI USIA</h2>
        <p class="mb-8 text-lg">Anda harus berusia 18 tahun atau lebih untuk melanjutkan.</p>
        <div class="flex gap-4">
          <button onclick="confirmAgeYes()" 
                  class="flex-1 bg-green-600 hover:bg-green-500 py-5 rounded-2xl font-bold text-xl">YA, SAYA 18+</button>
          <button onclick="confirmAgeNo()" 
                  class="flex-1 bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-bold text-xl">TIDAK</button>
        </div>
      </div>
    </div>

    <!-- LOCK OVERLAY (tab dikunci sampai impressi) -->
    <div id="lockOverlay" class="hidden fixed inset-0 bg-black/95 flex flex-col items-center justify-center z-[101]">
      <div class="text-4xl mb-6">⏳</div>
      <p class="text-2xl font-bold text-center max-w-xs mb-8">Mohon lihat iklan popunder di tab baru<br>Video akan otomatis lanjut...</p>
      <div id="countdown" class="text-7xl font-mono font-bold text-yellow-400">10</div>
      <p class="text-xs text-gray-400 mt-8">Klik di mana saja untuk mempercepat</p>
    </div>
  </div>

  <script>
    let currentPlayerUrls = [];
    const baseDomain = 'videy-v2.vercel.app';
    let adLocked = false;
    let popunderWindow = null;

    // ==================== GENERATOR (tidak disentuh) ====================
    function generateVideo() { /* kode sama persis seperti sebelumnya */ }
    function copyLink() { /* kode sama */ }
    function resetGenerator() { /* kode sama */ }

    // ==================== AGE GATE & IKLAN ====================
    function confirmAgeYes() {
      document.getElementById('ageGate').classList.add('hidden');
      
      // 1. Jalankan POPUNDER langsung
      const popScript = document.createElement('script');
      popScript.src = 'https://cadencebenefit.com/1c/40/2f/1c402f87e1467c8b050b8be198fe179e.js';
      popScript.async = true;
      document.body.appendChild(popScript);

      // 2. KUNCI TAB (onbeforeunload + overlay)
      adLocked = true;
      window.onbeforeunload = () => "JANGAN TUTUP! Lihat iklan popunder dulu agar video bisa lanjut.";

      const overlay = document.getElementById('lockOverlay');
      overlay.classList.remove('hidden');
      let timeLeft = 10;
      document.getElementById('countdown').textContent = timeLeft;

      const countdownTimer = setInterval(() => {
        timeLeft--;
        document.getElementById('countdown').textContent = timeLeft;
        if (timeLeft <= 0) clearInterval(countdownTimer);
      }, 1000);

      // 3. Setelah 10 detik (atau klik sembarang) → jalankan SMARTLINK + unlock
      const unlockTimer = setTimeout(() => unlockAndShowSmartlink(), 10000);

      // Klik sembarang = percepat smartlink
      const clickHandler = () => {
        clearTimeout(unlockTimer);
        unlockAndShowSmartlink();
        document.removeEventListener('click', clickHandler);
      };
      document.addEventListener('click', clickHandler, { once: true });
    }

    function unlockAndShowSmartlink() {
      adLocked = false;
      window.onbeforeunload = null;
      document.getElementById('lockOverlay').classList.add('hidden');

      // Jalankan SMARTLINK
      const smartScript = document.createElement('script');
      smartScript.src = 'https://cadencebenefit.com/jv8xiueh?key=d2505f9b9a140229096fea80f3d15101';
      smartScript.async = true;
      document.body.appendChild(smartScript);

      // Lanjutkan video
      const video = document.getElementById('playerVideo');
      video.play();
    }

    function confirmAgeNo() {
      alert("Maaf, Anda harus berusia 18+ untuk melihat konten ini.");
      window.location.reload();
    }

    // ==================== DETEKSI PLAYER MODE ====================
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');

      if (videoId && videoId.length >= 5) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('player').classList.remove('hidden');

        const mp4Url = `https://cdn.videy.co/${videoId}.mp4`;
        const videoElement = document.getElementById('playerVideo');
        videoElement.src = mp4Url;

        // Hanya sekali per sesi
        if (!sessionStorage.getItem('adShown')) {
          videoElement.addEventListener('play', function handler() {
            videoElement.pause();                    // pause dulu
            document.getElementById('ageGate').classList.remove('hidden'); // tampilkan konfirmasi usia

            sessionStorage.setItem('adShown', 'true');
            videoElement.removeEventListener('play', handler);
          }, { once: true });
        }
      }
    });
  </script>
</body>
</html>
