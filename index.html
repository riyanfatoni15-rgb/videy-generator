<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    video { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 1rem; background: black; }
    #social-bar { 
      background: linear-gradient(to right, #1e293b, #0f172a); 
      border-top: 1px solid #334155; 
    }
    /* Style untuk Age Confirmation Popup */
    #agePopup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #ageContent {
      background: #1e293b;
      padding: 2rem;
      border-radius: 1rem;
      text-align: center;
      max-width: 90%;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    #ageContent h2 {
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
    }
    .age-btn {
      padding: 1rem 2rem;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 0.75rem;
      margin: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #confirmAge {
      background: #22c55e;
    }
    #confirmAge:hover { background: #16a34a; }
    #denyAge {
      background: #ef4444;
    }
    #denyAge:hover { background: #dc2626; }
  </style>
  <!-- Histats.com START (hidden counter) -->
  <div style="display:none;">
    <a href="/" target="_blank">
      <img src="//sstatic1.histats.com/0.gif?5011553&101" alt="" border="0">
    </a>
  </div>
  <!-- Histats.com END -->
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Generator (tidak disentuh, tanpa iklan) -->
  <div id="generator" class="w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Videy Video Generator</h1>
    
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
      <p class="mb-4 text-lg">Paste link videy.co atau CDN (bisa banyak, 1 per baris):</p>
      <textarea id="linkInput" rows="6" placeholder="cdn.videy.co/ID.mp4 atau videy.co/v?id=abc123&#10;cdn.videy.co/XXXXX.mp4&#10;..." 
                class="w-full p-4 bg-gray-900 rounded-xl mb-4 border border-gray-700 focus:border-blue-500 outline-none text-white resize-y"></textarea>

      <button onclick="generateVideo()" 
              class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg active:bg-blue-800">
        Generate
      </button>
    </div>
  </div>

  <!-- Hasil Generate (tidak disentuh, tanpa iklan) -->
  <div id="result" class="hidden w-full max-w-md mt-6">
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
      <div class="flex items-center justify-center mb-6">
        <span class="text-3xl font-bold text-green-400">✓ Berhasil!</span>
      </div>

      <div class="space-y-6">
        <div>
          <p class="text-sm text-gray-300 mb-2">Link Custom (share ini):</p>
          <div id="playerUrlDisplay" class="bg-gray-900 p-4 rounded-xl break-all text-sm font-mono text-blue-300 whitespace-pre-wrap max-h-60 overflow-auto"></div>

          <button onclick="copyLink()" 
                  class="mt-3 w-full bg-gray-700 py-3 rounded-xl text-sm font-medium active:bg-gray-600">
            Copy Semua Link
          </button>
        </div>

        <video id="preview" controls class="w-full"></video>

        <p class="text-xs text-gray-500 text-center">
          Bagikan link di atas, saat dibuka hanya video saja.
        </p>
      </div>

      <button onclick="resetGenerator()" 
              class="mt-6 w-full bg-gray-600 py-3 rounded-xl text-sm font-medium hover:bg-gray-500">
        Generate Lagi
      </button>
    </div>
  </div>

  <!-- Player Murni - FULL LAYAR dengan social bar di bawah video -->
  <div id="player" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
    <video id="playerVideo" controls playsinline class="flex-1 w-full h-full object-contain"></video>
    
    <!-- Social bar sekarang di sini, bawah video player -->
    <div id="social-bar" class="p-3 flex flex-col items-center gap-3">
      <div class="w-full max-w-[728px] mx-auto">
        <script src="https://cadencebenefit.com/87/af/01/87af01047ed0235cc20e01e1acff5bab.js"></script>
      </div>

      <a href="https://t.me/+gVjq0F4OzR1iZGQ1" target="_blank" 
         class="p-4 flex items-center justify-center gap-3 bg-gradient-to-r from-blue-900/40 to-indigo-900/40 hover:from-blue-800/60 hover:to-indigo-800/60 transition-colors rounded-xl w-full max-w-md">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM16.29 8.18L13.39 15.08C13.28 15.32 13.07 15.49 12.82 15.55C12.57 15.61 12.3 15.55 12.09 15.39L10.5 14.12L9.5 16.5L7.5 16.5L10.09 10.92C10.2 10.68 10.41 10.51 10.66 10.45C10.91 10.39 11.18 10.45 11.39 10.61L13 11.88L14 9.5L16 9.5L13.41 15.08C13.3 15.32 13.09 15.49 12.84 15.55C12.59 15.61 12.32 15.55 12.11 15.39L10.5 14.12L9.5 16.5L7.5 16.5L10.09 10.92C10.2 10.68 10.41 10.51 10.66 10.45C10.91 10.39 11.18 10.45 11.39 10.61L13 11.88L14 9.5L16 9.5L16.29 8.18Z" fill="#0088CC"/>
        </svg>
        <span class="text-white font-medium text-base">Join Telegram Kami</span>
      </a>
    </div>
  </div>

  <!-- Age Confirmation Popup -->
  <div id="agePopup">
    <div id="ageContent">
      <h2>Konfirmasi Usia</h2>
      <p class="mb-6 text-lg">Anda harus berusia minimal 18 tahun untuk melanjutkan.</p>
      <button id="confirmAge" class="age-btn text-white">Saya sudah 18+</button>
      <button id="denyAge" class="age-btn text-white">Belum 18 tahun</button>
    </div>
  </div>

  <script>
    // Fungsi trigger popunder (pakai script loader seperti sebelumnya)
    function triggerPopunder() {
      const script = document.createElement('script');
      script.src = 'https://cadencebenefit.com/d7/40/72/d740727fb09e8bff8da9a4708c619bd7.js';
      script.async = true;
      document.body.appendChild(script);
    }

    let currentPlayerUrls = [];
    const baseDomain = 'videy-v2.vercel.app';
    let hasTriggeredFirstPlay = false;

    function generateVideo() {
      const textarea = document.getElementById('linkInput');
      const rawInput = textarea.value.trim();
      if (!rawInput) return alert('Masukkan link dulu!');

      const lines = rawInput.split('\n').map(line => line.trim()).filter(line => line);
      if (lines.length === 0) return alert('Tidak ada link yang valid');

      const results = [];
      currentPlayerUrls = [];

      for (let input of lines) {
        try {
          input = input.replace(/['"]/g, '');
          input = input.replace(/\s+/g, '');
          input = input.replace(/,$/g, '');

          if (!/^https?:\/\//i.test(input)) input = 'https://' + input;
          input = input.replace(/^http:\/\//i, 'https://');
          input = input.replace(/^httpss?:\/\//i, 'https://');
          input = input.replace(/\?['"]?id=/g, '?id=');

          const url = new URL(input);
          let id = url.searchParams.get('id');

          if (!id) {
            const pathParts = url.pathname.split('/').filter(p => p);
            if (pathParts.length >= 2 && (pathParts[0].toLowerCase() === 'v' || pathParts[0] === '')) {
              id = pathParts[1];
            } else if (pathParts.length >= 1) {
              const last = pathParts.pop();
              if (last && !last.toLowerCase().endsWith('.mp4') && last.length >= 5) {
                id = last;
              }
            }
          }

          if (!id && url.hostname.includes('videy.co') && url.pathname.endsWith('.mp4')) {
            id = url.pathname.split('/').pop().replace(/\.mp4$/i, '');
          }

          if (!id || id.length < 5) continue;

          const mp4Url = `https://cdn.videy.co/${id}.mp4`;
          const playerUrl = baseDomain + '?v=' + id;

          results.push(playerUrl);
          currentPlayerUrls.push(playerUrl);

        } catch (e) {
          console.log('Skip link invalid:', input, e);
        }
      }

      if (results.length === 0) {
        return alert('Tidak ada link yang valid. Pastikan formatnya benar.');
      }

      document.getElementById('generator').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('playerUrlDisplay').textContent = results.join('\n\n');
      
      if (results.length > 0) {
        const firstId = results[0].split('?v=')[1];
        document.getElementById('preview').src = `https://cdn.videy.co/${firstId}.mp4`;
      }

      const allLinksText = results.join('\n');
      navigator.clipboard.writeText(allLinksText)
        .then(() => {
          alert(`Berhasil generate ${results.length} link!\nSemua link sudah dicopy ke clipboard.`);
        })
        .catch(() => {
          alert(`Berhasil generate ${results.length} link!\nClipboard gagal, select manual ya.`);
        });
    }

    function copyLink() {
      if (currentPlayerUrls.length > 0) {
        const allLinks = currentPlayerUrls.join('\n');
        navigator.clipboard.writeText(allLinks)
          .then(() => alert(`Sudah copy ${currentPlayerUrls.length} link!`))
          .catch(() => alert('Gagal copy, select manual semua link ya.'));
      }
    }

    function resetGenerator() {
      document.getElementById('linkInput').value = '';
      document.getElementById('generator').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('preview').src = '';
      currentPlayerUrls = [];
    }

    // PLAYER & POPUNDER + AGE POPUP LOGIC - hanya di player full layar
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');

      if (videoId && videoId.length >= 5) {
        // Sembunyikan generator & result, tampilkan player full
        document.getElementById('generator').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('player').classList.remove('hidden');

        const mp4Url = `https://cdn.videy.co/${videoId}.mp4`;
        const video = document.getElementById('playerVideo');
        video.src = mp4Url;

        // First play → trigger popunder
        video.addEventListener('play', function firstPlayHandler() {
          if (!hasTriggeredFirstPlay) {
            hasTriggeredFirstPlay = true;
            triggerPopunder();
          }
          video.removeEventListener('play', firstPlayHandler);
        }, { once: true });

        // Tampilkan popup usia setelah \~10 detik play
        video.addEventListener('play', () => {
          setTimeout(() => {
            if (!sessionStorage.getItem('ageConfirmed')) {
              document.getElementById('agePopup').style.display = 'flex';
            }
          }, 10000);
        }, { once: true });

        // Tombol konfirmasi usia → trigger popunder + tutup popup
        function handleAgeButton() {
          triggerPopunder();
          sessionStorage.setItem('ageConfirmed', 'true');
          document.getElementById('agePopup').style.display = 'none';
        }

        document.getElementById('confirmAge').addEventListener('click', handleAgeButton);
        document.getElementById('denyAge').addEventListener('click', handleAgeButton);
      }
    });
  </script>
</body>
</html>
