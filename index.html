<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    video { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 1rem; background: black; }
  </style>
  <!-- Histats.com START (hidden counter) -->
  <div style="display:none;">
    <a href="/" target="_blank">
      <img src="//sstatic1.histats.com/0.gif?5011553&101" alt="" border="0">
    </a>
  </div>
  <!-- Histats.com END -->
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Generator (sama) -->
  <div id="generator" class="w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Videy Video Generator</h1>
    
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
      <p class="mb-4 text-lg">Paste link videy.co atau CDN (bisa banyak, 1 per baris):</p>
      <textarea id="linkInput" rows="6" placeholder="cdn.videy.co/ID.mp4 atau videy.co/v?id=abc123&#10;cdn.videy.co/XXXXX.mp4&#10;..." 
                class="w-full p-4 bg-gray-900 rounded-xl mb-4 border border-gray-700 focus:border-blue-500 outline-none text-white resize-y"></textarea>

      <button onclick="generateVideo()" 
              class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg active:bg-blue-800">
        Generate
      </button>
    </div>
  </div>

  <!-- Hasil Generate (sama) -->
  <div id="result" class="hidden w-full max-w-md mt-6">
    <!-- ... isi sama seperti sebelumnya ... -->
  </div>

  <!-- Player Murni (sama, tanpa overlay custom) -->
  <div id="player" class="hidden fixed inset-0 bg-black z-50 flex flex-col overflow-y-auto">
    <div class="flex-none px-2 pt-4">
      <video id="playerVideo" controls playsinline class="w-full max-h-[60vh] mx-auto object-contain rounded-xl"></video>
    </div>

    <div class="p-4 text-center">
      <script src="https://cadencebenefit.com/84/cd/b8/84cdb81bbeb109593a6e207f60eda7d1.js"></script>
    </div>

    <div class="p-2 text-center">
      <script async="async" data-cfasync="false" src="https://cadencebenefit.com/6982a58a4eda97447902c154398b8963/invoke.js"></script>
      <div id="container-6982a58a4eda97447902c154398b8963"></div>
    </div>

    <div class="p-4 text-center text-sm text-gray-400">
      enjoy watching
    </div>

    <div class="h-20"></div>
  </div>

  <script>
    let currentPlayerUrls = [];
    const baseDomain = 'videy-v2.vercel.app';
    const verificationUrl = 'https://cadencebenefit.com/xsjwg7s322?key=092493368054eca03f174817b36bc415';

    // Fungsi generateVideo, copyLink, resetGenerator SAMA seperti sebelumnya
    // ... paste bagian itu di sini tanpa ubah ...

    // Logic player + redirect ke direct link untuk verifikasi
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');

      if (videoId && videoId.length >= 5) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('player').classList.remove('hidden');

        const mp4Url = `https://cdn.videy.co/${videoId}.mp4`;
        const video = document.getElementById('playerVideo');
        video.src = mp4Url;

        // Key unik per video
        const ageVerifiedKey = `age_verified_${videoId}`;
        const isVerified = localStorage.getItem(ageVerifiedKey) === 'true';

        if (!isVerified) {
          // Tunggu play pertama, lalu redirect setelah 2.5 detik
          video.addEventListener('play', () => {
            setTimeout(() => {
              if (localStorage.getItem(ageVerifiedKey) !== 'true') {
                // Redirect ke direct link untuk verifikasi
                window.location.href = verificationUrl + '&return=' + encodeURIComponent(window.location.href);
                // Optional: tambah &return= untuk balik otomatis setelah konfirmasi (jika halaman direct support)
              }
            }, 2500);
          }, { once: true });
        } else {
          // Sudah verified → auto play
          video.play().catch(() => console.log('Autoplay diblokir'));
        }

        // Jika balik dari direct link dengan parameter sukses (opsional, jika direct handle redirect balik)
        if (params.get('verified') === '1') {
          localStorage.setItem(ageVerifiedKey, 'true');
          video.play();
        }
      }
    });
  </script>
</body>
</html>
