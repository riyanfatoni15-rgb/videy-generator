<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #0a0a0a; 
      color: #f1f1f1; 
    }
    video { 
      width: 100%; 
      max-height: 70vh; 
      object-fit: contain; 
      border-radius: 16px; 
      background: #000; 
    }
  </style>
  <!-- Histats.com START -->
  <div style="display:none;">
    <a href="/" target="_blank">
      <img src="//sstatic1.histats.com/0.gif?5011553&101" alt="" border="0">
    </a>
  </div>
  <!-- Histats.com END -->
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

  <!-- Generator -->
  <div id="generator" class="w-full max-w-md">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-semibold tracking-tighter">videy</h1>
      <p class="text-zinc-500 mt-1 text-lg">player</p>
    </div>
    
    <div class="bg-zinc-950 border border-zinc-800 rounded-3xl p-8">
      <p class="mb-3 text-zinc-400 text-sm">Paste link videy.co atau CDN (satu per baris)</p>
      <textarea id="linkInput" rows="7" 
                class="w-full p-5 bg-black border border-zinc-800 focus:border-zinc-600 rounded-2xl outline-none text-white placeholder-zinc-600 resize-y text-base"
                placeholder="cdn.videy.co/abc123.mp4&#10;videy.co/v?id=xyz789"></textarea>

      <button onclick="generateVideo()" 
              class="w-full mt-8 bg-white text-black py-4 rounded-2xl font-semibold text-lg hover:bg-zinc-200 transition-colors">
        Generate
      </button>
    </div>
  </div>

  <!-- Hasil Generate -->
  <div id="result" class="hidden w-full max-w-md mt-10">
    <div class="bg-zinc-950 border border-zinc-800 rounded-3xl p-8">
      <div class="flex items-center gap-3 mb-8">
        <span class="text-3xl">✓</span>
        <span class="text-2xl font-medium text-emerald-400">Berhasil</span>
      </div>

      <div class="space-y-8">
        <div>
          <p class="text-xs text-zinc-500 mb-2 tracking-widest">LINK PLAYER</p>
          <div id="playerUrlDisplay" 
               class="bg-black p-5 rounded-2xl border border-zinc-800 text-emerald-300 font-mono text-sm whitespace-pre-wrap break-all max-h-56 overflow-auto"></div>

          <button onclick="copyLink()" 
                  class="mt-4 w-full border border-zinc-700 hover:border-zinc-500 py-3.5 rounded-2xl text-sm font-medium transition-colors">
            Copy Semua Link
          </button>
        </div>

        <div>
          <p class="text-xs text-zinc-500 mb-2 tracking-widest">PREVIEW</p>
          <video id="preview" controls></video>
        </div>
      </div>

      <button onclick="resetGenerator()" 
              class="mt-10 w-full py-3.5 text-zinc-400 hover:text-white text-sm transition-colors">
        Generate lagi
      </button>
    </div>
  </div>

  <!-- Player -->
  <div id="player" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
    <div class="flex-1 flex items-center justify-center p-4">
      <video id="playerVideo" 
             controls 
             playsinline 
             class="max-w-full max-h-full rounded-3xl"></video>
    </div>
    
    <!-- Age Gate -->
    <div id="ageGate" class="hidden fixed inset-0 bg-black/95 z-[9999] flex items-center justify-center">
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 max-w-sm text-center mx-4">
        <div class="text-5xl mb-4">🔞</div>
        <h2 class="text-3xl font-semibold mb-3">Age Verification</h2>
        <p class="text-zinc-400 mb-8 leading-relaxed">This content is for viewers 18 years and older.<br>Please confirm your age to continue watching.</p>
        <button onclick="confirmAge()" 
                class="w-full bg-white text-black py-4 rounded-2xl font-semibold text-lg hover:bg-zinc-200 transition-colors">
          Yes, I am 18 years old
        </button>
      </div>
    </div>
    
    <!-- Telegram -->
    <div class="p-6 bg-gradient-to-t from-black to-transparent">
      <a href="https://t.me/+gVjq0F4OzR1iZGQ1" target="_blank" 
         class="flex items-center gap-4 mx-auto max-w-sm bg-zinc-900 hover:bg-zinc-800 p-4 rounded-2xl transition-colors">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#0088CC">
          <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM16.29 8.18L13.39 15.08C13.28 15.32 13.07 15.49 12.82 15.55C12.57 15.61 12.3 15.55 12.09 15.39L10.5 14.12L9.5 16.5L7.5 16.5L10.09 10.92C10.2 10.68 10.41 10.51 10.66 10.45C10.91 10.39 11.18 10.45 11.39 10.61L13 11.88L14 9.5L16 9.5L16.29 8.18Z"/>
        </svg>
        <div>
          <div class="font-medium text-base">Join Telegram Kami</div>
          <div class="text-xs text-zinc-500">Update link terbaru</div>
        </div>
      </a>
    </div>
  </div>

  <script>
    let currentPlayerUrls = [];
    const baseDomain = 'cdn2-videy.vercel.app';

    function generateVideo() {
      const textarea = document.getElementById('linkInput');
      const rawInput = textarea.value.trim();
      if (!rawInput) return alert('Masukkan link dulu!');

      const lines = rawInput.split('\n').map(line => line.trim()).filter(line => line);
      if (lines.length === 0) return alert('Tidak ada link yang valid');

      const results = [];
      currentPlayerUrls = [];

      for (let input of lines) {
        try {
          input = input.replace(/['"]/g, '');
          input = input.replace(/\s+/g, '');
          input = input.replace(/,$/g, '');

          if (!/^https?:\/\//i.test(input)) input = 'https://' + input;
          input = input.replace(/^http:\/\//i, 'https://');
          input = input.replace(/^httpss?:\/\//i, 'https://');
          input = input.replace(/\?['"]?id=/g, '?id=');

          const url = new URL(input);
          let id = url.searchParams.get('id');

          if (!id) {
            const pathParts = url.pathname.split('/').filter(p => p);
            if (pathParts.length >= 2 && (pathParts[0].toLowerCase() === 'v' || pathParts[0] === '')) {
              id = pathParts[1];
            } else if (pathParts.length >= 1) {
              const last = pathParts.pop();
              if (last && !last.toLowerCase().endsWith('.mp4') && last.length >= 5) {
                id = last;
              }
            }
          }

          if (!id && url.hostname.includes('videy.co') && url.pathname.endsWith('.mp4')) {
            id = url.pathname.split('/').pop().replace(/\.mp4$/i, '');
          }

          if (!id || id.length < 5) continue;

          const playerUrl = baseDomain + '?v=' + id;
          results.push(playerUrl);
          currentPlayerUrls.push(playerUrl);

        } catch (e) {
          console.log('Skip link invalid:', input, e);
        }
      }

      if (results.length === 0) {
        return alert('Tidak ada link yang valid. Pastikan formatnya benar.');
      }

      document.getElementById('generator').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('playerUrlDisplay').textContent = results.join('\n\n');
      
      if (results.length > 0) {
        const firstId = results[0].split('?v=')[1];
        document.getElementById('preview').src = `https://cdn.videy.co/${firstId}.mp4`;
      }

      const allLinksText = results.join('\n');
      navigator.clipboard.writeText(allLinksText)
        .then(() => {
          alert(`Berhasil generate ${results.length} link!\nSemua link sudah dicopy.`);
        })
        .catch(() => {
          alert(`Berhasil generate ${results.length} link!`);
        });
    }

    function copyLink() {
      if (currentPlayerUrls.length > 0) {
        const allLinks = currentPlayerUrls.join('\n');
        navigator.clipboard.writeText(allLinks)
          .then(() => alert(`Sudah copy ${currentPlayerUrls.length} link!`))
          .catch(() => alert('Gagal copy, pilih manual ya.'));
      }
    }

    function resetGenerator() {
      document.getElementById('linkInput').value = '';
      document.getElementById('generator').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('preview').src = '';
      currentPlayerUrls = [];
    }

    // PLAYER + AGE GATE (versi simple & langsung)
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');

      if (videoId && videoId.length >= 5) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('player').classList.remove('hidden');

        const videoElement = document.getElementById('playerVideo');
        const ageGate = document.getElementById('ageGate');

        videoElement.src = `https://cdn.videy.co/${videoId}.mp4`;

        let ageConfirmed = false;
        let pausedTime = 0;

        // Fungsi klik konfirmasi usia
        window.confirmAge = function() {
          window.open('https://jackknifemonuments.com/jv8xiueh?key=d2505f9b9a140229096fea80f3d15101', '_blank');
          
          // Langsung lanjutkan video setelah buka link
          setTimeout(() => {
            ageGate.classList.add('hidden');
            videoElement.currentTime = pausedTime;
            videoElement.play();
          }, 500);
        };

        // Pause di detik ke-5 + tampilkan age gate
        videoElement.addEventListener('timeupdate', function() {
          if (!ageConfirmed && videoElement.currentTime >= 5) {
            pausedTime = videoElement.currentTime;
            videoElement.pause();
            ageGate.classList.remove('hidden');
            ageConfirmed = true;
          }
        });

        // Popunder saat play pertama (tetap seperti aslinya)
        if (!sessionStorage.getItem('popunderTriggered')) {
          const triggerPopunder = () => {
            if (typeof showPopunder === 'function') showPopunder();
            else if (typeof _popunder === 'function') _popunder();
            else document.body.click();
            sessionStorage.setItem('popunderTriggered', 'true');
          };

          videoElement.addEventListener('play', triggerPopunder, { once: true });
        }
      }
    });
  </script>

  <!-- Popunder Adsterra Script -->
  <script src="https://cadencebenefit.com/1c/40/2f/1c402f87e1467c8b050b8be198fe179e.js"></script>
</body>
</html>
