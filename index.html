<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videy v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: white; }
    video { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 1rem; background: black; }
  </style>
  <!-- Histats.com  START (html only)-->
<a href="/" alt="page hit counter" target="_blank" >
<embed src="//s10.histats.com/100.swf"  flashvars="jver=1&acsid=5011553&domi=4"  quality="high"  width="103" height="48" name="100.swf"  align="middle" type="application/x-shockwave-flash" pluginspage="//www.macromedia.com/go/getflashplayer" wmode="transparent" /></a>
<img  src="//sstatic1.histats.com/0.gif?5011553&101" alt="" border="0">
<!-- Histats.com  END  -->
  
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

  <!-- Generator -->
  <div id="generator" class="w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-8">Videy Video Generator</h1>
    
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
      <p class="mb-4 text-lg">Paste link videy.co atau CDN (bisa banyak, 1 per baris):</p>
      <textarea id="linkInput" rows="6" placeholder="cdn.videy.co/ID.mp4 atau videy.co/v?id=abc123&#10;cdn.videy.co/XXXXX.mp4&#10;..." 
                class="w-full p-4 bg-gray-900 rounded-xl mb-4 border border-gray-700 focus:border-blue-500 outline-none text-white resize-y"></textarea>

      <button onclick="generateVideo()" 
              class="w-full bg-blue-600 py-4 rounded-xl font-bold text-lg active:bg-blue-800">
        Generate
      </button>
    </div>
  </div>

  <!-- Hasil Generate -->
  <div id="result" class="hidden w-full max-w-md mt-6">
    <div class="bg-gray-800 p-6 rounded-2xl shadow-xl">
      <div class="flex items-center justify-center mb-6">
        <span class="text-3xl font-bold text-green-400">✓ Berhasil!</span>
      </div>

      <div class="space-y-6">
        <div>
          <p class="text-sm text-gray-300 mb-2">Link Custom (share ini):</p>
          <div id="playerUrlDisplay" class="bg-gray-900 p-4 rounded-xl break-all text-sm font-mono text-blue-300 whitespace-pre-wrap max-h-60 overflow-auto"></div>

          <button onclick="copyLink()" 
                  class="mt-3 w-full bg-gray-700 py-3 rounded-xl text-sm font-medium active:bg-gray-600">
            Copy Semua Link
          </button>
        </div>

        <video id="preview" controls class="w-full"></video>

        <p class="text-xs text-gray-500 text-center">
          Bagikan link di atas, saat dibuka hanya video saja.
        </p>
      </div>

      <button onclick="resetGenerator()" 
              class="mt-6 w-full bg-gray-600 py-3 rounded-xl text-sm font-medium hover:bg-gray-500">
        Generate Lagi
      </button>
    </div>
  </div>

  <!-- Player Murni (saat dibuka dengan ?v=ID) -->
  <div id="player" class="hidden fixed inset-0 bg-black z-50 flex flex-col">
    <video id="playerVideo" controls playsinline class="flex-1 w-full h-full object-contain"></video>
    <div class="p-4 text-center text-sm text-gray-400">
      enjoy watching
    </div>
  </div>

  <script>
    let currentPlayerUrls = [];

    function generateVideo() {
      const textarea = document.getElementById('linkInput');
      const rawInput = textarea.value.trim();
      if (!rawInput) return alert('Masukkan link dulu!');

      const lines = rawInput.split('\n').map(line => line.trim()).filter(line => line);
      if (lines.length === 0) return alert('Tidak ada link yang valid');

      const results = [];
      currentPlayerUrls = [];

      for (let input of lines) {
        try {
          input = input.replace(/['"]/g, '');
          input = input.replace(/\s+/g, '');

          if (!/^https?:\/\//i.test(input)) input = 'https://' + input;

          input = input.replace(/^http:\/\//i, 'https://');
          input = input.replace(/^httpss?:\/\//i, 'https://');
          input = input.replace(/\?['"]?id=/g, '?id=');

          const url = new URL(input);
          let id = url.searchParams.get('id');

          if (!id) {
            const pathParts = url.pathname.split('/').filter(p => p);
            if (pathParts.length >= 2 && pathParts[0] === 'v') id = pathParts[1];
          }

          if (!id && url.hostname.includes('videy.co') && url.pathname.endsWith('.mp4')) {
            id = url.pathname.split('/').pop().replace(/\.mp4$/i, '');
          }

          if (!id || id.length < 5) continue;

          const mp4Url = `https://cdn.videy.co/${id}.mp4`;
          const originWithoutProtocol = window.location.origin.replace(/^https?:\/\//i, '');
          const playerUrl = originWithoutProtocol + '?v=' + id;

          results.push(playerUrl);
          currentPlayerUrls.push(playerUrl);

        } catch (e) {
          // skip error per baris
        }
      }

      if (results.length === 0) {
        return alert('Tidak ada link yang valid. Pastikan formatnya benar.');
      }

      document.getElementById('generator').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');

      document.getElementById('playerUrlDisplay').textContent = results.join('\n\n');
      
      if (results.length > 0) {
        const firstId = results[0].split('?v=')[1];
        document.getElementById('preview').src = `https://cdn.videy.co/${firstId}.mp4`;
      }

      const allLinksText = results.join('\n');
      navigator.clipboard.writeText(allLinksText).catch(() => {});
      alert(`Berhasil generate \( {results.length} link!\nSemua link sudah dicopy ke clipboard.\n\n \){allLinksText}`);
    }

    function copyLink() {
      if (currentPlayerUrls.length > 0) {
        const allLinks = currentPlayerUrls.join('\n');
        navigator.clipboard.writeText(allLinks)
          .then(() => alert(`Sudah copy ${currentPlayerUrls.length} link!`))
          .catch(() => alert('Gagal copy, select manual semua link ya.'));
      }
    }

    function resetGenerator() {
      document.getElementById('linkInput').value = '';
      document.getElementById('generator').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('preview').src = '';
      currentPlayerUrls = [];
    }

    // Mode player murni saat ?v=ID
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('v');

      if (videoId && videoId.length >= 5) {
        document.getElementById('generator').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('player').classList.remove('hidden');

        const mp4Url = `https://cdn.videy.co/${videoId}.mp4`;
        const video = document.getElementById('playerVideo');
        video.src = mp4Url;

        // Social Bar (tetap seperti semula)
        const socialBarKey = `videy_socialbar_${videoId}`;
        let hasLoadedSocialBar = localStorage.getItem(socialBarKey) === 'true';

        function loadSocialBar() {
          if (!hasLoadedSocialBar) {
            hasLoadedSocialBar = true;
            localStorage.setItem(socialBarKey, 'true');

            const script = document.createElement('script');
            script.src = 'https://cadencebenefit.com/87/af/01/87af01047ed0235cc20e01e1acff5bab.js';
            script.async = true;
            document.body.appendChild(script);
          }
        }
        loadSocialBar();

        // Flag untuk overlay monetize (sekali per video ID)
        const monetizeKey = `videy_monetize_${videoId}`;
        let hasShownOverlay = localStorage.getItem(monetizeKey) === 'true';

        const monetizeUrl = "https://cadencebenefit.com/jv8xiueh?key=d2505f9b9a140229096fea80f3d15101";

        function showMonetizeOverlay() {
          if (hasShownOverlay) return;
          hasShownOverlay = true;
          localStorage.setItem(monetizeKey, 'true');

          // Buat overlay full screen
          const overlay = document.createElement('div');
          overlay.style.position = 'fixed';
          overlay.style.top = '0';
          overlay.style.left = '0';
          overlay.style.width = '100%';
          overlay.style.height = '100%';
          overlay.style.background = 'rgba(0,0,0,0.9)';
          overlay.style.zIndex = '9999';
          overlay.style.display = 'flex';
          overlay.style.alignItems = 'center';
          overlay.style.justifyContent = 'center';

          const iframe = document.createElement('iframe');
          iframe.src = monetizeUrl;
          iframe.style.width = '100%';
          iframe.style.height = '100%';
          iframe.style.border = 'none';
          iframe.allow = 'fullscreen';
          overlay.appendChild(iframe);

          // Tombol close
          const closeBtn = document.createElement('button');
          closeBtn.textContent = '× Tutup Iklan & Lanjut Nonton';
          closeBtn.style.position = 'absolute';
          closeBtn.style.top = '15px';
          closeBtn.style.right = '15px';
          closeBtn.style.padding = '12px 24px';
          closeBtn.style.background = '#ef4444';
          closeBtn.style.color = 'white';
          closeBtn.style.border = 'none';
          closeBtn.style.borderRadius = '8px';
          closeBtn.style.fontSize = '16px';
          closeBtn.style.cursor = 'pointer';
          closeBtn.style.zIndex = '10000';
          closeBtn.onclick = () => {
            document.body.removeChild(overlay);
            if (video.paused) video.play();  // lanjut play kalau sempat pause
          };
          overlay.appendChild(closeBtn);

          document.body.appendChild(overlay);

          // Pause video sementara selama overlay muncul
          video.pause();
        }

        // Trigger: klik pada area video
        video.addEventListener('click', showMonetizeOverlay);

        // Khusus mobile: touchstart
        if (/Mobi|Android/i.test(navigator.userAgent)) {
          video.addEventListener('touchstart', showMonetizeOverlay, { once: true });
        }

        // Delay otomatis setelah halaman load (biar user sempat nonton sedikit)
        setTimeout(() => {
          if (!hasShownOverlay) {
            showMonetizeOverlay();
          }
        }, 4000);  // 4 detik – bisa diubah ke 6000 atau 8000 kalau mau lebih lama

        // Optional: setelah video diputar 10 detik
        video.addEventListener('play', () => {
          setTimeout(() => {
            if (!hasShownOverlay) {
              showMonetizeOverlay();
            }
          }, 10000);
        });
      }
    });
  </script>
</body>
</html>
